<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<title>Model AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Informasi Model AI</h2>

<table class="table table-bordered">

<tr>
    <th>Algoritma</th>
    <td>{{ algorithm }}</td>
</tr>

<tr>
    <th>Dataset</th>
    <td>{{ dataset }}</td>
</tr>

<tr>
    <th>Jumlah Fitur</th>
    <td>{{ fitur }}</td>
</tr>

<tr>
    <th>Target</th>
    <td>{{ target }}</td>
</tr>

<tr>
    <th>Accuracy</th>
    <td>{{ accuracy }}</td>
</tr>

<tr>
    <th>Precision</th>
    <td>{{ precision }}</td>
</tr>

<tr>
    <th>Recall</th>
    <td>{{ recall }}</td>
</tr>

<tr>
    <th>F1 Score</th>
    <td>{{ f1 }}</td>
</tr>

</table>

<h4 class="mt-4">Decision Tree</h4>

<img src="{{ url_for('static', filename='decision_tree.png') }}"
     class="img-fluid border">

<h4 class="mt-4">Feature Importance</h4>

<img src="{{ url_for('static', filename='feature_importance.png') }}"
     class="img-fluid border">

<br><br>

<a href="/dashboard" class="btn btn-primary">
    Kembali ke Dashboard
</a>

</div>

</body>

</html>
