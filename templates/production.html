<!DOCTYPE html>
<html>
<head>
    <title>Data Produksi SMT</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f5f5;
            margin:40px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#0d6efd;
            color:white;
            padding:10px;
        }

        td{
            padding:10px;
            border:1px solid #ddd;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        a{
            text-decoration:none;
        }

        button{
            padding:8px 15px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h2>Data Produksi SMT</h2>

<a href="/add_production">
<button>Tambah Data</button>
</a>


<a href="/export_pdf">
    <button class="btn btn-danger">
        Export PDF
    </button>
</a>

<br><br>

<table>

<tr>
    <th>ID</th>
    <th>Component</th>
    <th>Solder</th>
    <th>AOI</th>
    <th>Temperature</th>
    <th>Speed</th>
    <th>Placement</th>
    <th>SPI</th>
    <th>Label</th>
    <th>Aksi</th>
</tr>

{% for row in data %}

<tr>
    <td>{{row[0]}}</td>
    <td>{{row[1]}}</td>
    <td>{{row[2]}}</td>
    <td>{{row[3]}}</td>
    <td>{{row[4]}}</td>
    <td>{{row[5]}}</td>
    <td>{{row[6]}}</td>
    <td>{{row[7]}}</td>
    <td>{{row[8]}}</td>

    <td>
        <a href="/edit_production/{{row[0]}}">Edit</a> |
        <a href="/delete_production/{{row[0]}}"
           onclick="return confirm('Yakin ingin menghapus data?')">
           Hapus
        </a>
    </td>
</tr>

{% endfor %}

</table>

<form method="GET">

<input
type="text"
name="keyword"
placeholder="Cari Component">

<button>

Cari

</button>

</form>

<br>

<a href="/dashboard">Kembali ke Dashboard</a>

</body>

<footer class="text-center mt-5 mb-3">

<hr>

<p>
© 2026 SMT Production Prediction System
</p>

</footer>

</html>
