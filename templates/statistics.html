<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<title>Statistik SMT Production</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container mt-4">

<h2 class="mb-4">📊 Statistik SMT Production</h2>

<div class="row">

<div class="col-md-4">

<div class="card bg-primary text-white">

<div class="card-body text-center">

<h5>Total Produk</h5>

<h2>{{ total }}</h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card bg-success text-white">

<div class="card-body text-center">

<h5>Good</h5>

<h2>{{ good }}</h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card bg-danger text-white">

<div class="card-body text-center">

<h5>Defect</h5>

<h2>{{ defect }}</h2>

</div>

</div>

</div>

</div>

<hr>

<div class="row">

<div class="col-md-6">

<div class="card">

<div class="card-header">

Good vs Defect

</div>

<div class="card-body">

<canvas id="pieChart"></canvas>

</div>

</div>

</div>

<div class="col-md-6">

<div class="card">

<div class="card-header">

Component Type

</div>

<div class="card-body">

<canvas id="barChart"></canvas>

</div>

</div>

</div>

</div>

<hr>

<h4>Distribusi Component</h4>

<table class="table table-bordered">

<tr>

<th>Component</th>

<th>Jumlah</th>

</tr>

{% for i in range(component_label|length) %}

<tr>

<td>{{ component_label[i] }}</td>

<td>{{ component_total[i] }}</td>

</tr>

{% endfor %}

</table>

<a href="/dashboard" class="btn btn-secondary">

← Kembali ke Dashboard

</a>

</div>

<script>

new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{

labels:["Good","Defect"],

datasets:[{

data:[{{ good }},{{ defect }}],

backgroundColor:["green","red"]

}]

}

});

new Chart(document.getElementById("barChart"),{

type:"bar",

data:{

labels:{{ component_label|tojson }},

datasets:[{

label:"Jumlah",

data:{{ component_total|tojson }}

}]

}

});

</script>

</body>

</html>
