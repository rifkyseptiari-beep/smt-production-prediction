<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi SMT Production</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Prediksi Produk SMT Production</h3>
        </div>

        <div class="card-body">

            <!-- Flash Message -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{category}} alert-dismissible fade show">
                            {{message}}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/predict" method="POST">

                <div class="mb-3">
                    <label class="form-label">Component Type</label>
                    <select name="component_type" class="form-select" required>
                        <option value="">-- Pilih Component --</option>
                        <option value="IC">IC</option>
                        <option value="Resistor">Resistor</option>
                        <option value="Capacitor">Capacitor</option>
                        <option value="Connector">Connector</option>
                        <option value="Diode">Diode</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Solder Quality</label>
                    <select name="solder_quality" class="form-select" required>
                        <option value="">-- Pilih --</option>
                        <option value="Good">Good</option>
                        <option value="Minor">Minor</option>
                        <option value="Major">Major</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">AOI Result</label>
                    <select name="aoi_result" class="form-select" required>
                        <option value="">-- Pilih --</option>
                        <option value="Pass">Pass</option>
                        <option value="Fail">Fail</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Reflow Temperature (°C)</label>
                    <input
                        type="number"
                        name="reflow_temp"
                        class="form-control"
                        min="200"
                        max="260"
                        step="0.1"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Conveyor Speed (m/min)</label>
                    <input
                        type="number"
                        name="conveyor_speed"
                        class="form-control"
                        min="0.5"
                        max="2.5"
                        step="0.1"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Placement Accuracy (%)</label>
                    <input
                        type="number"
                        name="placement_accuracy"
                        class="form-control"
                        min="80"
                        max="100"
                        step="0.01"
                        required>
                </div>

                <div class="mb-4">
                    <label class="form-label">SPI Result</label>
                    <select name="spi_result" class="form-select" required>
                        <option value="">-- Pilih --</option>
                        <option value="Pass">Pass</option>
                        <option value="Fail">Fail</option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        Prediksi
                    </button>

                    <button type="reset" class="btn btn-secondary">
                        Reset
                    </button>

                    <a href="/dashboard" class="btn btn-primary">
                        Dashboard
                    </a>
                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
