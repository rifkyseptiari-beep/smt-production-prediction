<!DOCTYPE html>
<html>
<head>
    <title>Evaluasi Model</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<h2>Evaluasi Model Decision Tree</h2>

<table class="table table-bordered">

<tr>
<th>Accuracy</th>
<td>{{accuracy}} %</td>
</tr>

<tr>
<th>Precision</th>
<td>{{precision}} %</td>
</tr>

<tr>
<th>Recall</th>
<td>{{recall}} %</td>
</tr>

<tr>
<th>F1 Score</th>
<td>{{f1}} %</td>
</tr>

</table>

<a href="/dashboard" class="btn btn-primary">
Kembali
</a>

<h3 class="mt-4">Confusion Matrix</h3>

<img
    src="{{ url_for('static', filename=confusion_image) }}"
    class="img-fluid border"
    alt="Confusion Matrix">

</div>
<footer class="text-center mt-5 mb-3">

<hr>

<p>
© 2026 SMT Production Prediction System
</p>

</footer>

</body>
</html>
